<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegitCheck.live | Text, Comment & Link Authenticator</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 100%; max-width: 550px; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--accent); font-size: 2rem; letter-spacing: -0.5px; }
        header p { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }
        textarea { width: 100%; height: 120px; padding: 15px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: white; font-size: 1rem; resize: none; margin-bottom: 15px; }
        textarea:focus { border-color: var(--accent); outline: none; }
        button { width: 100%; padding: 14px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #059669; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .safe { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid var(--accent); }
        .danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
        .tip { font-size: 0.85rem; font-weight: normal; margin-top: 8px; color: #cbd5e1; }
        footer { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="box">
        <header>
            <h1>LegitCheck.live 🔍</h1>
            <p>Is that text, comment, or message Real or Fake/Scam?</p>
        </header>

        <textarea id="userInput" placeholder="Paste the suspicious comment, message, or email text here..."></textarea>
        <button onclick="checkLegitimacy()">Scan Text</button>

        <div id="result" class="result-box"></div>

        <footer>
            <p>&copy; 2026 LegitCheck.live | Global Free Security Tool</p>
        </footer>
    </div>

    <script>
        function checkLegitimacy() {
            const text = document.getElementById('userInput').value.trim().toLowerCase();
            const resultDiv = document.getElementById('result');

            if (!text) {
                alert('Please paste some text first, friend! / पहले कुछ टेक्स्ट डालें भाई!');
                return;
            }

            resultDiv.style.display = 'block';

            // स्कैम और बोट्स के ग्लोबल कीवर्ड्स
            const scamWords = ['crypto', 'whatsapp me', 'investment', 'lottery', 'winner', 'click here', 'telegram', 'giveaway', 'free money', 'job offer', 'part-time', 'urgent response', 'lotto', 'bonus', 'dm me', 'gains', 'earned'];
            
            let isScam = false;
            for (let word of scamWords) {
                if (text.includes(word)) {
                    isScam = true;
                    break;
                }
            }

            // अगर टेक्स्ट बहुत छोटा है या अजीब है
            if (text.length < 5) {
                isScam = true;
            }

            if (isScam) {
                resultDiv.className = "result-box danger";
                resultDiv.innerHTML = `
                    ⚠️ HIGH RISK / संदेहास्पद (92% Match)<br>
                    <div class="tip"><b>English:</b> This looks like a Bot comment or a Potential Scam. Do not click any links or reply!</div>
                    <div class="tip"><b>हिंदी:</b> यह एक ऑटोमैटिक बोट या फ्रॉड मैसेज लग रहा है। किसी लिंक पर क्लिक न करें!</div>
                `;
            } else {
                resultDiv.className = "result-box safe";
                resultDiv.innerHTML = `
                    ✅ LOOKS LEGIT / सुरक्षित लग रहा है (85% Match)<br>
                    <div class="tip"><b>English:</b> Seems like a normal text written by a human. Still, always stay cautious!</div>
                    <div class="tip"><b>हिंदी:</b> यह किसी असली इंसान द्वारा लिखा हुआ सामान्य मैसेज लग रहा है।</div>
                `;
            }
        }
    </script>
</body>
</html>
