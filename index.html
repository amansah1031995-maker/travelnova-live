<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelNova - Search Flights, Hotels & Buses</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        header { background: #003580; color: white; padding: 20px; text-align: center; }
        .hero { padding: 50px 20px; text-align: center; }
        .search-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: -70px auto 0; }
        input, select { padding: 15px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 200px; }
        button { padding: 15px 30px; background: #ff6600; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .features { display: flex; justify-content: space-around; padding: 50px; }
    </style>
</head>
<body>

<header>
    <h1>TravelNova.live</h1>
</header>

<div class="hero">
    <h2>Explore the World, Simply.</h2>
</div>

<div class="search-box">
    <input type="text" placeholder="From where?">
    <input type="text" placeholder="To where?">
    <select>
        <option>Flights</option>
        <option>Hotels</option>
        <option>Buses</option>
    </select>
    <button>Search Now</button>
</div>

<section class="features">
    <div><h3>✈️ Best Flights</h3></div>
    <div><h3>🏨 Luxury Hotels</h3></div>
    <div><h3>🚌 Global Buses</h3></div>
</section>

</body>
</html>
